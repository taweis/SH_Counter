<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Space Hulk Turn Counter</title>

<link href="https://fonts.googleapis.com/css2?family=Federo&display=swap" rel="stylesheet">

<style>
:root {
  --marine: #2b6dff;
  --tyranid: #b11d2f;
  --accent: #f0c75e;
  --panel: rgba(10,15,30,.85);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Federo', sans-serif;
  background-image:
    linear-gradient(rgba(5,10,25,.82), rgba(5,10,25,.82)),
    url("images/space_hulk_background.jpg");
  background-size: cover;
  background-position: center;
  color: #f3f6ff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.space-hulk-title {
  display: inline-block;
  margin: 0 auto 18px auto;
  text-align: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: clamp(4.5rem, 12vw, 8rem);
  font-weight: 900;
  letter-spacing: 4px;
  white-space: nowrap;
  color: #f0c75e;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.85),
     1px -1px 0 rgba(0,0,0,0.85),
    -1px  1px 0 rgba(0,0,0,0.85),
     1px  1px 0 rgba(0,0,0,0.85),
     0 0 14px rgba(240,199,94,.75),
     0 0 32px rgba(240,199,94,.45),
     0 0 60px rgba(240,199,94,.25);
  position: relative;
  line-height: 1;
}

.space-hulk-title.hidden { display: none; }
.space-hulk-title.flicker { animation: flicker 1.5s ease-in-out; }

@keyframes flicker {
  0% { opacity: 0; transform: scale(0.98); }
  10% { opacity: 1; }
  20% { opacity: 0.3; }
  30% { opacity: 1; }
  40% { opacity: 0.5; }
  50% { opacity: 1; transform: scale(1.02); }
  70% { opacity: 0.7; }
  100% { opacity: 1; transform: scale(1); }
}

.space-hulk-title::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  pointer-events: none;
  white-space: nowrap;
  font: inherit;
  letter-spacing: inherit;
  line-height: inherit;
  text-align: center;
  color: transparent;
  text-shadow: none;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0) 49.2%,
    rgba(255,255,255,0.95) 50%,
    rgba(255,255,255,0) 50.8%,
    rgba(255,255,255,0) 100%
  );
  background-size: 220% 100%;
  background-repeat: no-repeat;
  background-position: -140% 0;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: sweep 5s linear infinite;
}

@keyframes sweep {
  0% { background-position: -140% 0; }
  100% { background-position: 140% 0; }
}

@supports (-webkit-touch-callout: none) {
  .space-hulk-title {
    text-shadow:
      -1px -1px 0 rgba(0,0,0,0.55),
       1px -1px 0 rgba(0,0,0,0.55),
      -1px  1px 0 rgba(0,0,0,0.55),
       1px  1px 0 rgba(0,0,0,0.55),
       0 0 8px rgba(240,199,94,.55),
       0 0 18px rgba(240,199,94,.28),
       0 0 36px rgba(240,199,94,.14);
  }

  .space-hulk-title::after {
    opacity: 0.9;
  }
}

.main-layout {
  width: 100%;
  display: grid;
  grid-template-columns: 190px minmax(0, 650px) 190px;
  gap: 18px;
  align-items: start;
  justify-content: center;
}

.objectives-panel,
.destruct-panel,
.card {
  background: var(--panel);
  border: 2px solid rgba(255,255,255,.15);
  border-radius: 20px;
  backdrop-filter: blur(6px);
}

.objectives-panel,
.destruct-panel {
  padding: 18px 14px;
}

.destruct-panel {
  border-color: rgba(255, 110, 110, .22);
  box-shadow: 0 0 18px rgba(150, 20, 20, .12);
}

.objectives-title {
  text-align: center;
  font-size: 1rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #f0c75e;
  opacity: 0.9;
  margin-bottom: 12px;
}

.objectives-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.objective-button {
  width: 100%;
  min-height: 78px;
  padding: 10px 12px;
  border: 1px solid rgba(120, 180, 255, 0.18);
  border-radius: 14px;
  background:
    linear-gradient(180deg, rgba(130, 180, 255, 0.08), rgba(20, 30, 55, 0.55));
  color: #cfdcff;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.03),
    0 0 0 1px rgba(0,0,0,.12);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-align: center;
}

.objective-button:hover {
  background:
    linear-gradient(180deg, rgba(130, 180, 255, 0.12), rgba(20, 30, 55, 0.65));
}

.objective-button.active {
  border-color: rgba(240,199,94,.45);
  background:
    linear-gradient(180deg, rgba(240,199,94,.22), rgba(70, 55, 18, 0.65));
  color: #ffe7a7;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.05),
    0 0 14px rgba(240,199,94,.18);
}

.destruct-button.active {
  border-color: rgba(255,120,120,.58);
  background:
    linear-gradient(180deg, rgba(255,105,105,.26), rgba(68, 16, 16, 0.72));
  color: #ffd2d2;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.05),
    0 0 16px rgba(255,95,95,.24);
}

.objective-name {
  font-size: 0.92rem;
  letter-spacing: 0.5px;
}

.objective-status {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.8;
}

.card {
  width: 100%;
  max-width: 650px;
  padding: 28px;
  text-align: center;
}

.turn-banner {
  white-space: nowrap;
  width: 100%;
  margin: 0 auto 18px auto;
  padding: 14px 12px;
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 600;
  border-radius: 16px;
  border: 1px solid rgba(240,199,94,.25);
  background: rgba(240,199,94,.06);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  line-height: 1.05;
  overflow: hidden;
  min-height: 90px;
  opacity: 0.85;
}

.turn-banner.marine {
  border-color: rgba(43,109,255,.55);
  color: #9cc0ff;
  background: rgba(43,109,255,.12);
}

.turn-banner.tyranid {
  border-color: rgba(177,29,47,.6);
  color: #ff99a5;
  background: rgba(177,29,47,.12);
}

.count-row {
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 20px;
  margin: 10px 0 20px 0;
}

.count-box,
.endgame-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 18px;
  border: 1px solid rgba(240,199,94,.22);
  background: rgba(240,199,94,.06);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
}

.count-box {
  min-width: 220px;
  padding: 14px 20px 12px;
}

.endgame-box {
  min-width: 165px;
  padding: 14px 16px 12px;
  background: rgba(240,199,94,.10);
  border-color: rgba(240,199,94,.35);
}

.count {
  font-size: clamp(6rem, 16vw, 9rem);
  font-weight: 900;
  margin: 0;
  line-height: 1;
}

.endgame-label {
  font-size: clamp(0.95rem, 2.2vw, 1.2rem);
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.82;
  margin-bottom: 8px;
}

.endgame-value {
  font-size: clamp(4.5rem, 12vw, 6.75rem);
  font-weight: 900;
  line-height: 1;
  color: #f0c75e;
  text-shadow:
    0 0 10px rgba(240,199,94,.35),
    0 0 24px rgba(240,199,94,.18);
}

button {
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: 'Federo', sans-serif;
}

button:active { transform: scale(.97); }

.next-button {
  width: 100%;
  font-size: 2rem;
  font-weight: 900;
  padding: 30px 20px;
  background: rgba(240,199,94,.08);
  color: #ff6a2a;
  border: 1px solid rgba(240,199,94,.15);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
  backdrop-filter: blur(2px);
}

.next-button:disabled {
  opacity: 0.4;
  pointer-events: none;
}

.small-buttons {
  margin-top: 18px;
  display: flex;
  justify-content: space-between;
  gap: 50px;
}

.undo-button,
.reset-button {
  font-size: 1rem;
  padding: 10px 16px;
  background: #4a4f6b;
  color: #ddd;
  opacity: .85;
  border-radius: 12px;
  height: 44px;
  flex: 0.25;
}

.icon-wrapper {
  width: 170px;
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 170px;
}

.icon {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.icon.marine {
  width: auto;
  height: 55%;
  transform: scaleY(1.05);
  object-position: center;
}

.icon.tyranid {
  width: 100%;
  height: 100%;
}

@media (max-width: 900px) {
  .main-layout {
    grid-template-columns: 1fr;
    max-width: 650px;
  }

  .objectives-panel {
    order: 2;
  }

  .destruct-panel {
    order: 3;
  }

  .objectives-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
}

@media (max-width: 700px) {
  .turn-banner {
    font-size: clamp(1.8rem, 7vw, 3rem);
    min-height: 110px;
  }

  .count-row {
    gap: 12px;
  }

  .count-box {
    min-width: 170px;
    padding: 12px 14px 10px;
  }

  .endgame-box {
    min-width: 130px;
    padding: 12px 12px 10px;
  }

  .icon-wrapper {
    width: 120px;
    height: 80px;
    flex: 0 0 120px;
  }

  .count {
    font-size: clamp(5rem, 20vw, 8rem);
  }

  .objectives-list {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="app">
  <div id="spaceHulkTitle" class="space-hulk-title" data-text="SPACE HULK">SPACE HULK</div>

  <div class="main-layout">
    <aside class="objectives-panel">
      <div class="objectives-title">Hanger Defense Weapons</div>
      <div class="objectives-list" id="objectivesList">
        <button class="objective-button" data-index="0" onclick="toggleObjective(0)">
          <div class="objective-name">AUTOCANNONS</div>
          <div class="objective-status">Inactive</div>
        </button>
        <button class="objective-button" data-index="1" onclick="toggleObjective(1)">
          <div class="objective-name">LASCANNONS</div>
          <div class="objective-status">Inactive</div>
        </button>
        <button class="objective-button" data-index="2" onclick="toggleObjective(2)">
          <div class="objective-name">MULTI-LASERS</div>
          <div class="objective-status">Inactive</div>
        </button>
        <button class="objective-button" data-index="3" onclick="toggleObjective(3)">
          <div class="objective-name">HEAVY BOLTERS</div>
          <div class="objective-status">Inactive</div>
        </button>
      </div>
    </aside>

    <section class="card">
      <div class="turn-banner" id="activeTurnBanner">Press Next to Start</div>

      <div class="count-row">
        <div class="count-box">
          <div class="count" id="turnCount"></div>
        </div>
        <div class="endgame-box">
          <div class="endgame-label">End Game</div>
          <div class="endgame-value" id="endGameValue"></div>
        </div>
      </div>

      <button class="next-button" onclick="nextTurn()">NEXT</button>

      <div class="small-buttons">
        <button class="undo-button" onclick="undoTurn()">↶</button>
        <button class="reset-button" onclick="resetAll()">reset</button>
      </div>
    </section>

    <aside class="destruct-panel">
      <div class="objectives-title">Self Destruct</div>
      <div class="objectives-list" id="destructList">
        <button class="objective-button destruct-button" data-index="0" onclick="toggleDestruct(0)">
          <div class="objective-name">REACTOR CORE</div>
          <div class="objective-status">Inactive</div>
        </button>
        <button class="objective-button destruct-button" data-index="1" onclick="toggleDestruct(1)">
          <div class="objective-name">VOID CHARGES</div>
          <div class="objective-status">Inactive</div>
        </button>
      </div>
    </aside>
  </div>
</div>

<script>
const defaultState = {
  turn: 0,
  activeTurn: '',
  endGame: 11,
  objectives: [false, false, false, false],
  destruct: [false, false]
};

let state = loadState();
render();

function getElements() {
  return {
    titleEl: document.getElementById('spaceHulkTitle'),
    turnEl: document.getElementById('turnCount'),
    banner: document.getElementById('activeTurnBanner'),
    endGameEl: document.getElementById('endGameValue'),
    endGameBoxEl: document.querySelector('.endgame-box'),
    objectiveButtons: Array.from(document.querySelectorAll('.objectives-panel .objective-button')),
    destructButtons: Array.from(document.querySelectorAll('.destruct-panel .destruct-button'))
  };
}

function normalizeObjectives(value) {
  if (!Array.isArray(value)) return [...defaultState.objectives];
  return defaultState.objectives.map((_, index) => Boolean(value[index]));
}

function normalizeDestruct(value) {
  if (!Array.isArray(value)) return [...defaultState.destruct];
  return defaultState.destruct.map((_, index) => Boolean(value[index]));
}

function loadState() {
  const saved = localStorage.getItem('spaceHulkTurnCounter');
  if (!saved) return { ...defaultState, objectives: [...defaultState.objectives], destruct: [...defaultState.destruct] };

  try {
    const parsed = JSON.parse(saved);
    return {
      turn: Number.isInteger(parsed.turn) && parsed.turn >= 0 ? parsed.turn : 0,
      activeTurn: parsed.activeTurn === 'Space Marines' || parsed.activeTurn === 'Tyranids'
        ? parsed.activeTurn
        : '',
      endGame: Number.isInteger(parsed.endGame) && parsed.endGame > 0 ? parsed.endGame : 11,
      objectives: normalizeObjectives(parsed.objectives),
      destruct: normalizeDestruct(parsed.destruct)
    };
  } catch {
    return { ...defaultState, objectives: [...defaultState.objectives], destruct: [...defaultState.destruct] };
  }
}

function saveState() {
  localStorage.setItem('spaceHulkTurnCounter', JSON.stringify(state));
}

function triggerTitleFlicker() {
  const { titleEl } = getElements();
  if (!titleEl) return;
  titleEl.classList.remove('flicker');
  void titleEl.offsetWidth;
  titleEl.classList.add('flicker');
}

function advanceState(currentState) {
  const next = {
    ...currentState,
    objectives: [...currentState.objectives],
    destruct: [...currentState.destruct]
  };

  if (next.turn === 0) {
    next.turn = 1;
    next.activeTurn = 'Space Marines';
  } else if (next.activeTurn === 'Space Marines') {
    next.activeTurn = 'Tyranids';
  } else {
    next.activeTurn = 'Space Marines';
    next.turn += 1;
  }
  return next;
}

function rewindState(currentState) {
  const prev = {
    ...currentState,
    objectives: [...currentState.objectives],
    destruct: [...currentState.destruct]
  };

  if (prev.turn === 0) return prev;
  if (prev.turn === 1 && prev.activeTurn === 'Space Marines') {
    return {
      ...defaultState,
      endGame: prev.endGame,
      objectives: [...prev.objectives],
      destruct: [...prev.destruct]
    };
  }
  if (prev.activeTurn === 'Tyranids') {
    prev.activeTurn = 'Space Marines';
    return prev;
  }
  prev.activeTurn = 'Tyranids';
  prev.turn = Math.max(1, prev.turn - 1);
  return prev;
}

function toggleObjective(index) {
  if (index < 0 || index >= state.objectives.length) return;

  const nextObjectives = [...state.objectives];
  nextObjectives[index] = !nextObjectives[index];
  state.objectives = nextObjectives;
  state.endGame += nextObjectives[index] ? 1 : -1;
  if (state.endGame < 1) state.endGame = 1;

  saveState();
  render();
}

function toggleDestruct(index) {
  if (index < 0 || index >= state.destruct.length) return;

  const nextDestruct = [...state.destruct];
  nextDestruct[index] = !nextDestruct[index];
  state.destruct = nextDestruct;

  saveState();
  render();
}

function nextTurn() {
  // Prevent advancing past End Game
  if (state.turn >= state.endGame && state.activeTurn === 'Tyranids') {
    return;
  }

  state = advanceState(state);

  // Extra safety: clamp if somehow exceeded
  if (state.turn > state.endGame) {
    state.turn = state.endGame;
  }

  saveState();
  render();
}

function undoTurn() {
  state = rewindState(state);
  saveState();
  render();
}

function resetAll() {
  state = { ...defaultState, objectives: [...defaultState.objectives], destruct: [...defaultState.destruct] };
  saveState();
  render();
}

function renderObjectives(objectiveButtons) {
  objectiveButtons.forEach((button, index) => {
    const isActive = Boolean(state.objectives[index]);
    button.classList.toggle('active', isActive);
    const statusEl = button.querySelector('.objective-status');
    if (statusEl) {
      statusEl.textContent = isActive ? 'Weapons Fired' : 'Inactive';
    }
  });
}

function renderDestruct(destructButtons) {
  destructButtons.forEach((button, index) => {
    const isActive = Boolean(state.destruct[index]);
    button.classList.toggle('active', isActive);
    const statusEl = button.querySelector('.objective-status');
    if (statusEl) {
      statusEl.textContent = isActive ? 'Self Destruct Enabled' : 'Inactive';
    }
  });
}

function render() {
  const { titleEl, turnEl, banner, endGameEl, endGameBoxEl, objectiveButtons, destructButtons } = getElements();
  const nextButton = document.querySelector('.next-button');
  if (!titleEl || !turnEl || !banner || !endGameEl || !endGameBoxEl || !nextButton) return;

  endGameEl.textContent = String(state.endGame);
  renderObjectives(objectiveButtons);
  renderDestruct(destructButtons);

  const isGameOver = state.turn >= state.endGame && state.activeTurn === 'Tyranids';
  nextButton.disabled = isGameOver;
  nextButton.style.opacity = isGameOver ? '0.4' : '1';
  nextButton.style.pointerEvents = isGameOver ? 'none' : 'auto';

  if (state.turn === 0) {
    turnEl.textContent = '';
    banner.textContent = 'Press Next to Start';
    banner.classList.remove('marine', 'tyranid');
    endGameBoxEl.style.opacity = '0.95';

    const shouldFlicker = titleEl.classList.contains('hidden');
    titleEl.classList.remove('hidden');
    if (shouldFlicker) triggerTitleFlicker();
    return;
  }

  titleEl.classList.add('hidden');
  turnEl.textContent = String(state.turn);
  endGameBoxEl.style.opacity = state.turn >= state.endGame ? '1' : '0.95';

  if (isGameOver) {
    banner.textContent = 'MISSION COMPLETE';
    banner.classList.remove('marine', 'tyranid');
    return;
  }

  if (state.activeTurn === 'Space Marines') {
    banner.innerHTML = '<div class="icon-wrapper"><img class="icon marine" src="images/imperial_aquila.png" alt="Space Marines icon"></div><span>Space Marine</span>';
    banner.classList.remove('tyranid');
    banner.classList.add('marine');
  } else {
    banner.innerHTML = '<div class="icon-wrapper"><img class="icon tyranid" src="images/tyranid_icon.png" alt="Tyranid icon"></div><span>Tyranid</span>';
    banner.classList.remove('marine');
    banner.classList.add('tyranid');
  }
}

function runTests() {
  const assert = (condition, message) => {
    if (!condition) throw new Error(message);
  };

  let testState = { turn: 0, activeTurn: '', endGame: 11, objectives: [false, false, false, false], destruct: [false, false] };

  testState = advanceState(testState);
  assert(testState.turn === 1 && testState.activeTurn === 'Space Marines', 'Next from start should go to Turn 1 Space Marines');
  assert(testState.endGame === 11, 'Next should preserve End Game value');
  assert(testState.objectives.every(v => v === false), 'Next should preserve objectives');

  testState = advanceState(testState);
  assert(testState.turn === 1 && testState.activeTurn === 'Tyranids', 'Second next should go to Turn 1 Tyranids');

  testState = advanceState(testState);
  assert(testState.turn === 2 && testState.activeTurn === 'Space Marines', 'Third next should go to Turn 2 Space Marines');

  testState = rewindState(testState);
  assert(testState.turn === 1 && testState.activeTurn === 'Tyranids', 'Undo from Turn 2 Space Marines should go to Turn 1 Tyranids');

  testState = rewindState(testState);
  assert(testState.turn === 1 && testState.activeTurn === 'Space Marines', 'Undo from Turn 1 Tyranids should go to Turn 1 Space Marines');

  testState = rewindState(testState);
  assert(testState.turn === 0 && testState.activeTurn === '', 'Undo from Turn 1 Space Marines should go to start');
  assert(testState.endGame === 11, 'Undo to start should preserve End Game value');

  let objectiveState = { turn: 0, activeTurn: '', endGame: 11, objectives: [false, false, false, false], destruct: [false, false] };
  objectiveState.objectives[2] = true;
  objectiveState.endGame += 1;
  assert(objectiveState.endGame === 12, 'Objective achieved should increase End Game by one');
  objectiveState.objectives[2] = false;
  objectiveState.endGame -= 1;
  assert(objectiveState.endGame === 11, 'Objective un-achieved should decrease End Game by one');

  const objectiveButtons = document.querySelectorAll('.objectives-panel .objective-button');
  const destructButtons = document.querySelectorAll('.destruct-panel .destruct-button');
  assert(objectiveButtons.length === 4, 'There should be 4 objective toggle buttons');
  assert(destructButtons.length === 2, 'There should be 2 self destruct toggle buttons');

  const appEl = document.querySelector('.app');
  const cardEl = document.querySelector('.card');
  const objectivesPanelEl = document.querySelector('.objectives-panel');
  const destructPanelEl = document.querySelector('.destruct-panel');
  const endGameValueEl = document.getElementById('endGameValue');
  const endGameBoxEl = document.querySelector('.endgame-box');
  const countRowEl = document.querySelector('.count-row');
  const mainLayoutEl = document.querySelector('.main-layout');

  assert(appEl instanceof HTMLElement, 'App container should exist');
  assert(cardEl instanceof HTMLElement, 'Card container should exist');
  assert(objectivesPanelEl instanceof HTMLElement, 'Objectives panel should exist');
  assert(destructPanelEl instanceof HTMLElement, 'Self destruct panel should exist');
  assert(endGameValueEl instanceof HTMLElement, 'End Game value element should exist');
  assert(endGameBoxEl instanceof HTMLElement, 'End Game box should exist');
  assert(countRowEl instanceof HTMLElement, 'Count row should exist');
  assert(mainLayoutEl instanceof HTMLElement, 'Main layout should exist');
  assert(getComputedStyle(mainLayoutEl).display === 'grid', 'Main layout should use grid');
  assert(getComputedStyle(countRowEl).display === 'flex', 'Count row should use flex layout');

  const declaredMaxWidth = parseFloat(getComputedStyle(cardEl).maxWidth);
  assert(Number.isFinite(declaredMaxWidth), 'Card should have a max width set');
  assert(Math.abs(declaredMaxWidth - 650) < 0.5, 'Card max width should be 650px');

  assert(defaultState.endGame === 11, 'End Game should default to 11');
  assert(defaultState.objectives.length === 4, 'There should be 4 default objectives');
  assert(defaultState.destruct.length === 2, 'There should be 2 default self destruct toggles');
}

runTests();
</script>
